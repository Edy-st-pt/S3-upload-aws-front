<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Formulário</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

.erro {
    color: red;
    font-size: 12px;
    margin-bottom: 8px;
}

button {
    width: 100%;
    padding: 10px;
    background-color: #4e73df;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #2e59d9;
}

.preview {
    text-align: center;
    margin-bottom: 10px;
}

.preview img {
    max-width: 120px;
    border-radius: 50%;
    margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
<h2>Cadastro de Formulário</h2>

<form id="form">

<input type="text" id="nome" placeholder="Nome completo" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="telefone" placeholder="Telefone" required>

<textarea id="formacao" placeholder="Formação acadêmica" required></textarea>
<textarea id="experiencia" placeholder="Experiência profissional" required></textarea>

<div class="preview">
    <input type="file" id="arquivo" accept=".jpg,.jpeg,.png,.pdf,.txt" required>
    <div class="erro" id="erroArquivo"></div>
    <img id="imagemPreview" />
</div>

<button type="submit">Enviar Arquivo</button>

</form>
</div>

<script>

const arquivoInput = document.getElementById("arquivo");
const preview = document.getElementById("imagemPreview");

// Validação + preview
arquivoInput.addEventListener("change", function() {

    const file = this.files[0];

    if (!file) {
        preview.src = "";
        return;
    }

    const tiposPermitidos = [
        "image/jpeg",
        "image/png",
        "application/pdf",
        "text/plain"
    ];

    if (!tiposPermitidos.includes(file.type)) {
        document.getElementById("erroArquivo").innerText =
            "Formato inválido. Permitido: JPG, PNG, PDF e TXT.";
        this.value = "";
        preview.src = "";
        return;
    }

    if (file.size > 10 * 1024 * 1024) {
        document.getElementById("erroArquivo").innerText =
            "O arquivo deve ter no máximo 10MB.";
        this.value = "";
        preview.src = "";
        return;
    }

    document.getElementById("erroArquivo").innerText = "";

    if (file.type.startsWith("image/")) {
        preview.src = URL.createObjectURL(file);
    } else {
        preview.src = "";
    }
});

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefone = document.getElementById("telefone").value.trim();
    const formacao = document.getElementById("formacao").value.trim();
    const experiencia = document.getElementById("experiencia").value.trim();
    const arquivo = document.getElementById("arquivo").files[0];

    const formData = new FormData();
    formData.append("nome", nome);
    formData.append("email", email);
    formData.append("telefone", telefone);
    formData.append("formacao", formacao);
    formData.append("experiencia", experiencia);

    // 🔥 CORREÇÃO AQUI (nome igual ao backend)
    formData.append("foto", arquivo);

    try {
        const response = await fetch("http://localhost:8080/curriculo/upload", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            const erro = await response.text();
            alert("Erro: " + erro);
            return;
        }

        const data = await response.json();

        alert(data.mensagem + "\n\nArquivo salvo em:\n" + data.urlImagem);

        document.getElementById("form").reset();
        preview.src = "";

    } catch (error) {
        alert("Erro ao conectar com o servidor.");
    }
});
</script>

</body>
</html>

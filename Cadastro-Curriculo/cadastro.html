<!DOCTYPE html>
<html>
<head>
  <title>Cadastro de Currículo</title>
</head>
<body>

<h2>Currículo Online</h2>

<form id="form">
  <input type="text" placeholder="Nome" required><br><br>
  <input type="email" placeholder="Email" required><br><br>
  <input type="file" id="foto" required><br><br>
  <button type="submit">Salvar</button>
</form>

<script>
  const form = document.getElementById("form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append("foto", document.getElementById("foto").files[0]);

    const response = await fetch("http://localhost:8081/curriculo/upload", {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    alert(data.mensagem);
  });
</script>

</body>
</html>
